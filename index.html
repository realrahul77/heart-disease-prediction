<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart Disease Prediction</title>
  <style>
    body {
      background: #f7f9fc;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    form {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      display: inline-block;
    }
    input {
      margin: 5px;
      padding: 10px;
      width: 200px;
    }
    button {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    h2 { color: #333; }
    .result { margin-top: 20px; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>❤️ Heart Disease Prediction</h1>
  <form action="/predict" method="post">
    <input type="text" name="age" placeholder="Age" required><br>
    <input type="text" name="sex" placeholder="Sex (1=Male,0=Female)" required><br>
    <input type="text" name="cp" placeholder="Chest Pain Type (0-3)" required><br>
    <input type="text" name="trestbps" placeholder="Resting BP" required><br>
    <input type="text" name="chol" placeholder="Cholesterol" required><br>
    <input type="text" name="fbs" placeholder="Fasting Blood Sugar (1/0)" required><br>
    <input type="text" name="restecg" placeholder="Rest ECG (0-2)" required><br>
    <input type="text" name="thalach" placeholder="Max Heart Rate" required><br>
    <input type="text" name="exang" placeholder="Exercise Angina (1/0)" required><br>
    <input type="text" name="oldpeak" placeholder="Oldpeak" required><br>
    <input type="text" name="slope" placeholder="Slope (0-2)" required><br>
    <input type="text" name="ca" placeholder="CA (0-4)" required><br>
    <input type="text" name="thal" placeholder="Thal (1-3)" required><br>
    <button type="submit">Predict</button>
  </form>
  <div class="result">{{ prediction_text }}</div>
</body>
</html>
